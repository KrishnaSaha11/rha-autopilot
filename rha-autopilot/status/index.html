<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>RHA Autopilot — Status</title>
<style>
  body{font-family:system-ui,sans-serif;background:#ECEAE4;color:#22303C;margin:0;padding:20px;max-width:900px;margin:auto}
  h1{font-size:20px;border-bottom:2px solid #22303C;padding-bottom:10px}
  h1 span{color:#C2571B}
  .card{background:#F7F5F0;border:1px solid #CFC9BC;border-radius:10px;padding:16px;margin:12px 0;
    box-shadow:0 2px 8px rgba(34,48,60,.06)}
  .prod{font-weight:700;color:#C2571B;font-size:13px;text-transform:uppercase;letter-spacing:.08em}
  .head{font-weight:600;margin:6px 0}
  .date{font-size:12px;color:#5A6672;font-family:monospace}
  .badges{margin:10px 0;display:flex;gap:8px;flex-wrap:wrap}
  .b{font-size:12px;font-weight:600;padding:4px 12px;border-radius:99px}
  .ok{background:#DCEFE3;color:#2E7D4F}
  .fail{background:#F6E0D3;color:#9A4212}
  img{max-width:280px;border-radius:8px;border:1px solid #CFC9BC;display:block;margin-top:8px}
  a{color:#C2571B;font-weight:600;text-decoration:none;font-size:13px;margin-right:14px}
</style>
</head>
<body>
<h1>🏭 RHA <span>Autopilot</span> — Posting Status</h1>
<div id="list">Loading…</div>
<script>
fetch('log.json?t=' + Date.now()).then(r => r.json()).then(log => {
  const el = document.getElementById('list');
  if(!log.length){ el.textContent = 'No runs yet.'; return; }
  el.innerHTML = '';
  [...log].reverse().forEach(e => {
    const s = e.status || {};
    const badge = (name, v) => `<span class="b ${String(v).startsWith('ok') ? 'ok' : 'fail'}">${name}: ${String(v||'—').slice(0,40)}</span>`;
    const div = document.createElement('div');
    div.className = 'card';
    div.innerHTML =
      `<div class="prod">${e.product||''}</div>` +
      `<div class="head">${e.headline||'(generation failed)'}</div>` +
      `<div class="date">${e.date||''}</div>` +
      `<div class="badges">${badge('LinkedIn', s.linkedin)} ${badge('Blogger', s.blogger)} ${badge('Image', s.image)}</div>` +
      (e.linkedin_url ? `<a href="${e.linkedin_url}" target="_blank">Open LinkedIn ↗</a>` : '') +
      (e.blogger_url ? `<a href="${e.blogger_url}" target="_blank">Open Blog ↗</a>` : '') +
      (e.image ? `<img src="${e.image}" loading="lazy">` : '');
    el.appendChild(div);
  });
}).catch(() => document.getElementById('list').textContent = 'log.json not found — run the workflow once.');
</script>
</body>
</html>
